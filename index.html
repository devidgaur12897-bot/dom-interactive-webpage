<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Assignment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px;
    }

    .box {
      width: 100px;
      height: 100px;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background-color: white;
      font-weight: bold;
    }

    input {
      padding: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1 id="greeting">Hello</h1>

  <div class="container">
    <div class="box" onclick="changeColor(this, 'red')">Red</div>
    <div class="box" onclick="changeColor(this, 'blue')">Blue</div>
    <div class="box" onclick="changeColor(this, 'green')">Green</div>
    <div class="box" onclick="changeColor(this, 'yellow')">Yellow</div>
  </div>

  <input type="text" id="nameInput" placeholder="Enter your name">
  <button onclick="greetUser()">Greet</button>

  <script>
    function greetUser() {
      let name = document.getElementById("nameInput").value;
      let header = document.getElementById("greeting");

      if (name === "") {
        header.innerText = "Hello";
      } else {
        header.innerText = "Hello, " + name;
      }
    }

    function changeColor(element, color) {
      element.style.backgroundColor = color;
    }
  </script>

</body>
</html>
